name: Dependency Submission

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  submit-dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      - name: Submit Dependency Graph
        uses: advanced-security/maven-dependency-submission-action@v5
        with:
          directory: '.'
          maven-args: >-
            -DCLOUD_STORE_GROUP_ID=org.sunbird
            -DCLOUD_STORE_ARTIFACT_ID=cloud-storage-sdk-aws
            -DCLOUD_STORE_VERSION=2.0.0
            -DskipTests
